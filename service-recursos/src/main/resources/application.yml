server:
  port: 8082

spring:
  application:
    name: service-recursos
  datasource:
    url: jdbc:mysql://${DB_HOST:host.docker.internal}:3306/rednorte_recursos?createDatabaseIfNotExist=true&serverTimezone=UTC
    username: ${DB_USER:root}
    password: ${DB_PASS:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
  flyway:
    enabled: true
    baseline-on-migrate: true

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:host.docker.internal}:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: false
    instance-id: service-recursos:8082
    hostname: localhost
    non-secure-port: 8082
    ip-address: localhost
    status-page-url: http://localhost:8082/actuator/info
    health-check-url: http://localhost:8082/actuator/health
    home-page-url: http://localhost:8082/

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info

